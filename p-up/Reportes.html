<script>
const token = localStorage.getItem('token');
const area = localStorage.getItem('area');

if(!token){ window.location.href = 'index.html'; }
if(area !== 'Administracion'){ window.location.href = 'index.html'; }
</script>

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes Presupuestales</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/ssidebar.css">
    <link rel="stylesheet" href="../css/modales.css">

</head>

<body>

    <!-- SIDEBAR -->

    <div id="sidebar-container"></div>

    <!-- CONTENIDO -->

    <div class="contenido">

        <!-- TOPBAR -->

        <div class="topbar">

            <div class="titulo-principal">

                SECRETARÍA DE BIENESTAR E INCLUSIÓN SOCIAL

            </div>

            <div class="subtitulo">

                REPORTES DE PAGOS PRESUPUESTALES

            </div>

        </div>

        <br>

        <!-- FILTROS -->

        <div style="width:90%;margin:0 auto 16px;">

            <div class="panel-derecho">

                <div class="fila">

                    <label>ÁREA PRESUPUESTAL</label>

                    <select id="selectArea">
                        <option value="">— Selecciona un área —</option>
                        <option value="UP-01-DESPACHO">UP-01-DESPACHO</option>
                        <option value="UP-CA">UP-CA</option>
                        <option value="UP-01-S-DRM">UP-01-S-DRM</option>
                        <option value="UP-04-DGFA">UP-04-DGFA</option>
                        <option value="UP-05-Subse_I_D">UP-05-Subse_I_D</option>
                        <option value="UP-06-DGOLP">UP-06-DGOLP</option>
                        <option value="UP-07-MIGRANTES">UP-07-MIGRANTES</option>
                        <option value="UP-08-ASISTENCIA">UP-08-ASISTENCIA</option>
                        <option value="UP-13-SSPSyFA">UP-13-SSPSyFA</option>
                        <option value="UP-14-DISCAPACIDAD">UP-14-DISCAPACIDAD</option>
                        <option value="UP-15-SSDSyH">UP-15-SSDSyH</option>
                        <option value="UP-16">UP-16</option>
                    </select>

                </div>

                <div class="fila">

                    <label>MES</label>

                    <select id="selectMes">
                        <option value="">— Todos los meses —</option>
                        <option value="ENERO">ENERO</option>
                        <option value="FEBRERO">FEBRERO</option>
                        <option value="MARZO">MARZO</option>
                        <option value="ABRIL">ABRIL</option>
                        <option value="MAYO">MAYO</option>
                        <option value="JUNIO">JUNIO</option>
                        <option value="JULIO">JULIO</option>
                        <option value="AGOSTO">AGOSTO</option>
                        <option value="SEPTIEMBRE">SEPTIEMBRE</option>
                        <option value="OCTUBRE">OCTUBRE</option>
                        <option value="NOVIEMBRE">NOVIEMBRE</option>
                        <option value="DICIEMBRE">DICIEMBRE</option>
                    </select>

                </div>

                <div class="fila">

                    <label>AÑO</label>

                    <select id="selectAnio">
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                        <option value="2028">2028</option>
                    </select>

                </div>

                <button
                    type="button"
                    id="btnGenerar"
                    onclick="generarReporte()">

                    GENERAR REPORTE

                </button>

            </div>

        </div>

        <!-- TABLA -->

        <table id="tablaResultados">

            <thead>

                <tr>
                    <th>#</th>
                    <th>MES</th>
                    <th>PERSONA</th>
                    <th>CANTIDAD</th>
                </tr>

            </thead>

            <tbody id="tbodyReporte">

                <tr>
                    <td colspan="4" style="text-align:center;padding:24px;color:#999;">
                        Selecciona un área y genera el reporte para ver los datos.
                    </td>
                </tr>

            </tbody>

            <tfoot id="tfootReporte" style="display:none;">

                <tr>
                    <td colspan="3" style="text-align:right;font-weight:700;padding:10px;">
                        TOTAL
                    </td>
                    <td id="totalMonto" style="font-weight:700;text-align:center;padding:10px;">
                        $0.00
                    </td>
                </tr>

            </tfoot>

        </table>

        <div id="loader">Cargando...</div>

    </div>

    <!-- MODAL LOGOUT -->

    <div class="modal" id="modalLogout">
        <div class="modal-contenido">

            <h2>Cerrar Sesión</h2>
            <p>¿Estás seguro que deseas cerrar sesión?</p>

            <div class="modal-botones">
                <button
                    type="button"
                    class="btn-secundario"
                    onclick="cerrarModal('modalLogout')">
                    Cancelar
                </button>
                <button
                    type="button"
                    class="btn-principal"
                    id="confirmarLogout">
                    Cerrar Sesión
                </button>
            </div>

        </div>
    </div>

    <!-- OVERLAY -->

    <div id="overlay"></div>

    <!-- SCRIPTS -->

    <script src="../js/sidebar_CP.js"></script>
    <script src="../js/reportes.js"></script>

</body>

</html>
