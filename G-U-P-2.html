<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        Historial de Pagos

    </title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ssidebar.css">
    <link rel="stylesheet" href="css/pagos_realizados.css">

</head>

<body>

    <!-- SIDEBAR -->

    <div id="sidebar-container"></div>

    <!-- CONTENIDO -->

    <div class="contenido">

        <!-- TOPBAR -->

        <div class="topbar">

            <div class="titulo-principal">

                SECRETARÍA DEL BIENESTAR E INCLUSIÓN SOCIAL

            </div>

            <div class="subtitulo">

                HISTORIAL DE PAGOS REALIZADOS

            </div>

        </div>

        <br><br>

        <!-- CONTENEDOR -->

        <div class="contenedor-pagos">

            <!-- TOP -->

            <div class="top-pagos">

                <!-- ÁREA -->

                <div class="fila fila-top">

                    <label>

                        ÁREA PRESUPUESTAL

                    </label>

                    <select id="selectArea">

                        <option value="UP-01-DESPACHO">

                            UP-01-DESPACHO

                        </option>

                        <option value="UP-01-C_A">

                            UP-01-C_A

                        </option>

                        <option value="UP-01-S-DRM">

                            UP-01-S-DRM

                        </option>

                        <option value="UP-04-DGFA">

                            UP-04-DGFA

                        </option>

                        <option value="UP-05-Subse_I_D">

                            UP-05-Subse_I_D

                        </option>

                        <option value="UP-06-DGOLP">

                            UP-06-DGOLP

                        </option>

                        <option value="UP-07-MIGRANTES">

                            UP-07-MIGRANTES

                        </option>

                        <option value="UP-08-ASISTENCIA">

                            UP-08-ASISTENCIA

                        </option>

                        <option value="UP-13-SSPSyFA">

                            UP-13-SSPSyFA

                        </option>

                        <option value="UP-14-DISCAPACIDAD">

                            UP-14-DISCAPACIDAD

                        </option>

                        <option value="UP-15-SSDSyH">

                            UP-15-SSDSyH

                        </option>

                        <option value="UP-16">

                            UP-16

                        </option>

                    </select>

                </div>

                <!-- BUSCADOR -->

                <div class="fila fila-top">

                    <label>

                        BUSCAR

                    </label>

                    <input
                        type="text"
                        id="inputBusqueda"
                        placeholder="Buscar por persona o fecha..."
                    >

                </div>

            </div>

            <!-- TABLA -->

            <div class="tabla-container">

                <div class="tabla-header">

                    <h2>

                        PAGOS REALIZADOS

                    </h2>

                    <span id="contadorResultados">

                        0 registros

                    </span>

                </div>

                <div class="tabla-responsive">

                    <table>

                        <thead>

                            <tr>

                                <th>ID</th>

                                <th>PERSONA</th>

                                <th>FECHA Y HORA</th>

                                <th>OFICIO PDF</th>

                                <th>PLIEGO PDF</th>

                                <th>CANTIDAD</th>

                                <th>ESTATUS</th>

                            </tr>

                        </thead>

                        <tbody id="tbodyPagados">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <!-- SCRIPTS -->

    <script src="js/sidebar_CP.js"></script>
    <script src="js/pagos_realizados.js"></script>

</body>

</html>
